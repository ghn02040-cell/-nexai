<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232B5BFF'/%3E%3Cpath d='M13 10l9 6-9 6z' fill='white'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI와 AI 리터러시를 온라인 동영상으로 배우는 교육 플랫폼" />
    <meta name="theme-color" content="#0B1A33" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <title>AICADEMY · 온라인 AI 동영상 교육</title>
    <script>
      // FOUC 방지: 페인트 전에 저장된 테마 적용
      (function () {
        try {
          var t = localStorage.getItem('theme')
          var dark = t ? t === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
